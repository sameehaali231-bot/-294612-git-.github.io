<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a Quiz - Study Buddy</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f7f6;
            color: #333;
        }

        .welcome-container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #667eea;
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }

        p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 2rem;
        }

        .selection-area {
            text-align: left;
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #555;
        }

        select {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1.5rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: #667eea;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-bottom: 1.5rem;
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.02);
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: #667eea;
            font-weight: bold;
            border: 2px solid #667eea;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .back-btn:hover {
            background-color: #667eea;
            color: white;
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1>Create a Quiz</h1>
        <p>Select your level and subject to get started!</p>
        
        <div class="selection-area">
            <label for="grade">Grade Level</label>
            <select id="grade">
                <option value="1">Grade 1</option>
                <option value="2">Grade 2</option>
                <option value="3">Grade 3</option>
                <option value="4">Grade 4</option>
                <option value="5">Grade 5</option>
                <option value="6">Grade 6</option>
            </select>

            <label for="subject">Subject</label>
            <select id="subject">
                <option value="math">Math</option>
                <option value="science">Science</option>
                <option value="history">History</option>
                <option value="english">English</option>
            </select>
        </div>

        <button class="start-btn" onclick="handleStartQuiz()">
            Start Quiz
        </button>
        
        <br>
        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

    <script>
        function handleStartQuiz() {
            // Get the current selections
            const grade = document.getElementById('grade').value;
            const subject = document.getElementById('subject').value;

            // Logical Check: If Grade 1 AND Math are selected
            if (grade === "1" && subject === "math") {
                window.location.href = "grade1-math-topics.html";
            } else {
                // For other combinations, just show an alert for now
                alert("The Grade " + grade + " " + subject + " quiz is coming soon!");
            }
        }
    </script>

</body>
</html>
