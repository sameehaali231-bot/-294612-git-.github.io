<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtraction Quiz - Study Buddy</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .quiz-container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        h2 { color: #667eea; }
        .options-container { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .option-btn { padding: 12px; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .option-btn:hover { border-color: #667eea; background: #f0f2ff; }
        .feedback { margin: 15px 0; font-weight: bold; min-height: 24px; }
        .correct { color: #28a745; }
        .wrong { color: #dc3545; }
        .next-btn { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; display: none; margin: 0 auto; }
        .summary-item { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="quiz-container" id="quiz-box">
        <h2 id="question-text">Question</h2>
        <div class="options-container" id="options"></div>
        <div id="feedback" class="feedback"></div>
        <button id="next-button" class="next-btn" onclick="loadNextQuestion()">Next Question</button>
    </div>

    <div class="quiz-container hidden" id="summary-box">
        <h2>Quiz Complete!</h2>
        <div id="results-list"></div>
        <button class="next-btn" style="display:block; margin-top:20px;" onclick="location.href='grade1-math-topics.html'">Back to Topics</button>
    </div>

    <script>
        const quizData = [
            { q: "What is 6 - 2?", a: "4", options: ["3", "4", "5"] },
            { q: "What is 7 - 3?", a: "4", options: ["3", "4", "5"] },
            { q: "What is 9 - 4?", a: "5", options: ["4", "5", "6"] },
            { q: "What is 8 - 5?", a: "3", options: ["2", "3", "4"] }
        ];

        let currentIdx = 0;
        let score = 0;
        let userResults = [];

        function loadQuestion() {
            const current = quizData[currentIdx];
            document.getElementById("question-text").innerText = current.q;
            const optionsDiv = document.getElementById("options");
            optionsDiv.innerHTML = "";
            document.getElementById("feedback").innerText = "";
            document.getElementById("next-button").style.display = "none";

            current.options.forEach(opt => {
                const btn = document.createElement("button");
                btn.innerText = opt;
                btn.className = "option-btn";
                btn.onclick = () => checkAnswer(opt);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            const current = quizData[currentIdx];
            const feedback = document.getElementById("feedback");
            const btns = document.querySelectorAll(".option-btn");
            
            // Disable buttons after answer
            btns.forEach(b => b.disabled = true);

            if (selected === current.a) {
                feedback.innerText = "Correct! Well done.";
                feedback.className = "feedback correct";
                score++;
                userResults.push({ q: current.q, res: "Correct", class: "correct" });
            } else {
                feedback.innerText = "Oops! The correct answer was " + current.a;
                feedback.className = "feedback wrong";
                userResults.push({ q: current.q, res: "Wrong (Answer: " + current.a + ")", class: "wrong" });
            }
            document.getElementById("next-button").style.display = "block";
        }

        function loadNextQuestion() {
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showSummary();
            }
        }

        function showSummary() {
            document.getElementById("quiz-box").classList.add("hidden");
            const summaryBox = document.getElementById("summary-box");
            summaryBox.classList.remove("hidden");
            
            const list = document.getElementById("results-list");
            list.innerHTML = `<h3>Final Score: ${score}/${quizData.length}</h3>`;
            
            userResults.forEach(item => {
                const div = document.createElement("div");
                div.className = "summary-item";
                div.innerHTML = `<strong>${item.q}</strong> - <span class="${item.class}">${item.res}</span>`;
                list.appendChild(div);
            });
        }

        // Start the quiz
        loadQuestion();
    </script>
</body>
</html>
